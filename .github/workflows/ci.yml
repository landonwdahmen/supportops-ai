name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SupportOpsAI.sln

      - name: Build
        run: dotnet build SupportOpsAI.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SupportOpsAI.sln --configuration Release --no-build
